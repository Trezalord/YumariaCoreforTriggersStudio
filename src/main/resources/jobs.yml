jobs:
  miner:
    enabled: true
    display-name: "Mineur"
    description:
      - "Mine et récupère des ressources souterraines."
      - "Casser des minerais et de la pierre permet de progresser."
    icon:
      material: IRON_PICKAXE
      itemsadder-id: ""
    max-level: 100
    required-progress: "6 * (%level% ^ 2)"
    points-rewarded: "1 * %level%"
    allow-progress-when-inactive: false
    xp:
      multiplier: 1.0
    actions:
      vanilla_block_break:
        enabled: true
        progress: 1.0
        cooldown-ms: 0
    rewards:
      default:
        money: "4 * %level%"
        commands:
          - "eco give %player% %money%"
      levels:
        10:
          commands:
            - "lp user %player% permission set yumaria.jobs.miner.10"
        20:
          commands:
            - "lp user %player% permission set yumaria.jobs.miner.20"

  lumberjack:
