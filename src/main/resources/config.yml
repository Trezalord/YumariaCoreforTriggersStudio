language: fr
debug:
  enabled: false
  progress: false
  listeners: false
  bossbar: false
  jobs: false

allow-multiple-active-jobs: true
max-active-jobs: 2
save-interval-seconds: 300

addons:
  # If true, external plugins must register through YumariaJobsAPI.get().addons().
  require-registration: false
  # If false, an addon must be explicitly listed under addons.allowed.
  accept-unconfigured: true
  allowed:
    YumariaFishing:
      enabled: true
      professions:
        fisherman:
          enabled: true
          allowed-actions:
            fish_catch:
              enabled: true
              base-xp-multiplier: 1.0
              base-money-multiplier: 1.0
    YumariaFarming:
      enabled: true
      professions:
        farmer:
          enabled: true
          allowed-actions:
            crop_harvest:
              enabled: true
              base-xp-multiplier: 1.0
              base-money-multiplier: 1.0

progression:
  global-xp-multiplier: 1.0
  global-money-multiplier: 1.0
  permission-multipliers:
    yumariajobs.booster.vip: 1.10
    yumariajobs.booster.mvp: 1.20

economy:
  enabled: true

professions:
  fisherman:
    display-name: "&bPêcheur"
    enabled: true
    requires-active-job: true
    money:
      enabled: true
      multiplier: 1.0
  farmer:
    display-name: "&aFermier"
    enabled: true
    requires-active-job: true
    money:
      enabled: true
      multiplier: 1.0

xp:
  enabled: true
  global-multiplier: 1.0
  prestige-multiplier-per-prestige: 1.0
  permission-multipliers:
    yumariajobs.booster.vip: 1.10
    yumariajobs.booster.mvp: 1.20

progress:
  auto-join-on-progress: false
  save-delay-ticks: 40

integrations:
  yumaria-fishing:
    # Legacy compatibility hook. The target architecture is that YumariaFishing calls YumariaJobsAPI directly.
    enabled: false
    job-id: "pecheur"
    debug: false
    catch-detection-delay-ticks: 2
    catch-watch:
      enabled: true
      scan-interval-ticks: 2
      max-duration-ticks: 2400
      grace-after-inactive-ticks: 20
    detection:
      pdc-namespaces:
        - "yumariafishing"
        - "yumaria_fishing"
        - "yumaria"
        - "yfish"
        - "gukuan"
      pdc-key-contains:
        - "species"
        - "fish"
        - "rarity"
        - "quality"
        - "size"
        - "weight"
        - "base"
        - "category"
      itemsadder-namespaces:
        - "gukuan"
    progress:
      # yumaria-fishing-mastery mirrors YumariaFishing mastery XP, then scales it for YumariaJobs progress.
      # Use "configured" to use only the by-rarity/by-quality table below.
      mode: "yumaria-fishing-mastery"
      mastery-xp-scale: 0.125
      mastery-default-performance: 1.0
      default: 1.0
      by-rarity:
        COMMON: 1.0
        UNCOMMON: 1.5
        RARE: 2.5
        EPIC: 4.0
        LEGENDARY: 7.5
        MYTHIC: 12.0
      by-quality:
        NORMAL: 1.0
        BRONZE: 1.0
        SILVER: 1.15
        GOLD: 1.35
        IRIDIUM: 1.75
        DIAMOND: 1.75

anti-abuse:
  enabled: true
  debug: false
  defaults:
    min-delay-ms: 0
    max-xp-per-minute: 5000
    max-xp-per-hour: 75000
    suspicious-burst-actions: 0
    diminishing-returns:
      enabled: false
      window-seconds: 300
      threshold-actions: 120
      reduction-per-extra-action: 0.01
      max-reduction: 0.50
  jobs:
    fisherman:
      sources:
        yumariafishing:
          min-delay-ms: 500
          max-xp-per-minute: 5000
          max-xp-per-hour: 75000
          diminishing-returns:
            enabled: true
            window-seconds: 300
            threshold-actions: 120
            reduction-per-extra-action: 0.01
            max-reduction: 0.50
  actions:
    YumariaFishing:
      fish_catch:
        min-delay-ms: 500
        max-xp-per-minute: 5000
        max-money-per-minute: 25000
        max-actions-per-minute: 120
        diminishing-returns:
          enabled: true
          window-seconds: 300
          threshold-actions: 100
          reduction-per-extra-action: 0.01
          max-reduction: 0.50
    YumariaFarming:
      crop_harvest:
        min-delay-ms: 250
        max-xp-per-minute: 5000
        max-money-per-minute: 25000
        max-actions-per-minute: 180

progress-bar:
  enabled: true
  display-duration-seconds: 8
  color: PURPLE
  style: SEGMENTED_20
  use-actionbar-fallback: false
  title: "&d✦ %job_name% &8| %prestige_display%%rank% &8| &fNiv. %level% &8| &e%percent%%"
  prestige-display: "&5P%prestige% &8| "
  no-prestige-display: ""

  text-progress-bar:
    enabled: true
    length: 14
    filled-symbol: "■"
    empty-symbol: "■"
    filled-color: "&d"
    empty-color: "&8"

  subtitle:
    enabled: true
    format: "%text_progress_bar%"

ranks:
  - min-level: 100
    name: "Légende"
  - min-level: 90
    name: "Grand Maître"
  - min-level: 80
    name: "Maître"
  - min-level: 70
    name: "Expert"
  - min-level: 60
    name: "Spécialiste"
  - min-level: 50
    name: "Confirmé"
  - min-level: 40
    name: "Qualifié"
  - min-level: 30
    name: "Habitué"
  - min-level: 20
    name: "Ouvrier"
  - min-level: 10
    name: "Apprenti avancé"
  - min-level: 1
    name: "Apprenti"

prestige:
  enabled: true
  max-prestige: 10
  require-max-level: true
  reset-level-to: 1
  reset-progress: true
  rewards:
    money: "1000 * %prestige%"
    commands:
      - "lp user %player% permission set yumaria.jobs.%job_id%.prestige.%prestige%"
  progress-multiplier-per-prestige: 1.10

hooks:
  vault:
    enabled: true
  placeholderapi:
    enabled: true
  itemsadder:
    enabled: true
  citizens:
    enabled: true
  native-listeners:
    enabled: true
    miner-block-break: true
    lumberjack-log-break: true
    farmer-crop-harvest: true
    fisherman-fish-catch: true
    hunter-mob-kill: true
